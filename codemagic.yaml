workflows:
  ios-build:
    name: PetWellness iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build iOS app
        script: |
          xcodebuild \
            -project PetWellness.xcodeproj \
            -scheme PetWellness \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - build/**/*.app
